{% extends 'landing/base.html' %}
{% load static %}

{% block title %}Obrigado - SlimChoco{% endblock %}

{% block content %}
<main class="min-h-screen flex flex-col items-center justify-center bg-chocolate-dark text-white p-10">
    <div class="bg-white/10 p-12 rounded-3xl border border-gold/40 text-center max-w-lg">
        <div class="mb-6">
            <svg class="w-20 h-20 text-gold mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
        <h1 class="text-4xl font-bold text-gold mb-4">Obrigado!</h1>
        <p class="text-xl text-sand mb-8 leading-relaxed">
            Seu interesse no SlimChoco foi registrado. Entraremos em contato em breve com ofertas exclusivas.
        </p>
        <a href="{% url 'landing' %}" class="inline-block border-2 border-gold text-gold font-bold py-3 px-10 rounded-full hover:bg-gold hover:text-chocolate-dark transition-all duration-300">
            Voltar ao Início
        </a>
    </div>
</main>
{% endblock %}
